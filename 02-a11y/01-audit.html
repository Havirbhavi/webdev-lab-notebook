<!-- Prettier-style formatted Code -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercise 01 - Audit</title>
  </head>
  <body>
    <main>
      <h1>Payment Form</h1>

      <form>
        <!-- Name -->
        <label for="name">Name:</label><br />
        <input type="text" id="name" name="name" autocomplete="name" />
        <br /><br />

        <!-- Address -->
        <label for="address">Address:</label><br />
        <input
          type="text"
          id="address"
          name="address"
          autocomplete="street-address"
        />
        <br /><br />

        <!-- City -->
        <label for="city">City:</label><br />
        <input type="text" id="city" name="city" autocomplete="address-level2" />
        <br /><br />

        <!-- Zip -->
        <label for="zip">Zip Code:</label><br />
        <input
          type="text"
          id="zip"
          name="zip"
          autocomplete="postal-code"
        />
        <br /><br />

        <!-- Card Type -->
        <fieldset>
          <legend>Credit Card Type:</legend>

          <input type="radio" id="visa" name="card" value="visa" />
          <label for="visa">Visa</label><br />

          <input type="radio" id="mastercard" name="card" value="mastercard" />
          <label for="mastercard">MasterCard</label><br />

          <input type="radio" id="amex" name="card" value="amex" />
          <label for="amex">American Express</label>
        </fieldset>

        <br />

        <!-- Card Number -->
        <label for="cc_number">Credit Card Number:</label><br />
        <input
          type="text"
          id="cc_number"
          name="cc_number"
          inputmode="numeric"
          autocomplete="cc-number"
        />
        <br /><br />

        <!-- CVC -->
        <label for="cvv">CVC:</label><br />
        <input
          type="text"
          id="cvv"
          name="cvv"
          inputmode="numeric"
          autocomplete="cc-csc"
        />
        <br /><br />

        <!-- Submit -->
        <button type="submit">Submit</button>
      </form>
    </main>
  </body>
</html>
