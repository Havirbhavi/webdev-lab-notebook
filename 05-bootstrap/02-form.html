<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap Exercise 02 - Form</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </head>

  <body class="bg-light">
    <main class="container py-5">
      <form class="card shadow-sm mx-auto p-3 p-sm-4" style="max-width: 500px">
        <h1 class="text-center fs-2 mb-4">Roth IRA Calculator</h1>

        <div class="row align-items-center mb-3">
          <label for="balance" class="col-12 col-sm-6 col-form-label">
            Balance ($)
          </label>
          <div class="col-12 col-sm-6">
            <input type="text" class="form-control" id="balance" />
          </div>
        </div>

        <div class="row align-items-center mb-3">
          <label for="contribution" class="col-12 col-sm-6 col-form-label">
            Annual Contribution ($)
          </label>
          <div class="col-12 col-sm-6">
            <input type="text" class="form-control" id="contribution" />
          </div>
        </div>

        <fieldset class="row mb-3">
          <legend class="col-12 col-sm-6 col-form-label fs-6">
            Maximize contributions?
          </legend>

          <div class="col-12 col-sm-6">
            <div class="form-check">
              <input
                class="form-check-input"
                type="radio"
                name="maximize"
                id="yes"
              />
              <label class="form-check-label" for="yes">Yes</label>
            </div>

            <div class="form-check">
              <input
                class="form-check-input"
                type="radio"
                name="maximize"
                id="no"
              />
              <label class="form-check-label" for="no">No</label>
            </div>
          </div>
        </fieldset>

        <div class="row align-items-center mb-3">
          <label for="return" class="col-12 col-sm-6 col-form-label">
            Expected return (%)
          </label>
          <div class="col-12 col-sm-6">
            <input type="number" class="form-control" id="return" />
          </div>
        </div>

        <div class="row align-items-center mb-3">
          <label for="current-age" class="col-12 col-sm-6 col-form-label">
            Current age
          </label>
          <div class="col-12 col-sm-6">
            <input type="number" class="form-control" id="current-age" />
          </div>
        </div>

        <div class="row align-items-center mb-3">
          <label for="retirement-age" class="col-12 col-sm-6 col-form-label">
            Retirement age
          </label>
          <div class="col-12 col-sm-6">
            <input type="number" class="form-control" id="retirement-age" />
          </div>
        </div>

        <div class="row align-items-center mb-4">
          <label for="tax-rate" class="col-12 col-sm-6 col-form-label">
            Tax rate (%)
          </label>
          <div class="col-12 col-sm-6">
            <input type="number" class="form-control" id="tax-rate" />
          </div>
        </div>

        <div class="row g-2 mb-4">
          <div class="col-6">
            <button type="button" class="btn btn-primary w-100">
              Calculate
            </button>
          </div>

          <div class="col-6">
            <button type="reset" class="btn btn-outline-secondary w-100">
              Reset
            </button>
          </div>
        </div>

        <p class="text-body-secondary mb-0">
          This exercise is a simplified version of the Roth IRA Calculator
          <a href="https://www.calculator.net/roth-ira-calculator.html"
            >Calculator.net</a
          >
        </p>
      </form>
    </main>
  </body>
</html>
