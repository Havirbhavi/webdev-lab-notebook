<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Exercise 02 - Form</title>

    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <main class="form-page">
      <div class="form-card">
        <h1 class="form-title">Roth IRA Calculator</h1>

        <form class="form-container">
          <!-- Balance -->
          <div class="form-group">
            <label for="balance">Balance ($)</label>
            <input type="number" id="balance" name="balance" />
          </div>

          <!-- Contribution -->
          <div class="form-group">
            <label for="contribution">Annual contribution ($)</label>
            <input type="number" id="contribution" name="contribution" />
          </div>

          <!-- Radio -->
          <div class="form-group">
            <fieldset class="radio-fieldset">
              <legend>Maximize contribution?</legend>

              <div class="radio-group">
                <input type="radio" id="yes" name="maximize" />
                <label for="yes">Yes</label>

                <input type="radio" id="no" name="maximize" />
                <label for="no">No</label>
              </div>
            </fieldset>
          </div>

          <!-- Rate -->
          <div class="form-group">
            <label for="rate">Expected rate of return (%)</label>
            <input type="number" id="rate" name="rate" />
          </div>

          <!-- Age -->
          <div class="form-group">
            <label for="age">Current age</label>
            <input type="number" id="age" name="age" />
          </div>

          <!-- Retirement -->
          <div class="form-group">
            <label for="retirement">Retirement age</label>
            <input type="number" id="retirement" name="retirement" />
          </div>

          <!-- Tax -->
          <div class="form-group">
            <label for="tax">Marginal tax rate (%)</label>
            <input type="number" id="tax" name="tax" />
          </div>

          <!-- Buttons -->
          <div class="button-group">
            <button type="submit">Calculate</button>
            <button type="reset">Reset</button>
          </div>
        </form>

        <p class="form-footer">
          This exercise is a simplified version of the Roth IRA Calculator at
          <a href="https://www.calculator.net/roth-ira-calculator.html">
            Calculator.net
          </a>
        </p>
      </div>
    </main>
  </body>
</html>
